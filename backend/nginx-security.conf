# nginx-security.conf
# Drop this file into /etc/nginx/conf.d/ and include it in your server block,
# or paste the relevant sections into your existing nginx.conf / site config.
#
# Usage in your server {} block:
#   include /etc/nginx/conf.d/nginx-security.conf;

# ── Fix #1: Nginx version disclosure ─────────────────────────────────────────
# Add to http {} block in /etc/nginx/nginx.conf:
#   server_tokens off;
# This removes the nginx version from "Server:" response headers and error pages.

# ── Fix #2: Remove server identification entirely ─────────────────────────────
more_clear_headers 'Server';            # requires ngx_headers_more module
more_clear_headers 'X-Powered-By';
# If ngx_headers_more is not available, use:
# add_header Server "";   ← this doesn't fully work; server_tokens off is the correct way

# ── Fix #3: Host header injection ─────────────────────────────────────────────
# Reject requests with an unexpected Host header
# (Replace with your actual domain)
server {
    listen 80 default_server;
    server_name _;
    return 444;   # Drop connection for unrecognised Host headers
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ── Fix #4: Clickjacking — CSP frame-ancestors ───────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; upgrade-insecure-requests;" always;

    # ── Fix #5: Remove deprecated X-XSS-Protection header ────────────────────
    more_clear_headers 'X-XSS-Protection';
    # Without ngx_headers_more:
    # add_header X-XSS-Protection "";   ← sets empty but doesn't fully remove

    # ── Other hardening headers ───────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ── Fix #7: Cache-Control — no caching on HTML ───────────────────────────
    location ~* \.html?$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
    }

    # Static assets (Vite uses content-hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
    }

    # ── Fix #10: Block .git directory — URL-encoded bypass ───────────────────
    location ~* (\.git|%2[Ee]git|\.%67it|%2[Ee]%67it) {
        return 404;
    }

    # ── Fix #9: Block dangerous HTTP methods ─────────────────────────────────
    if ($request_method ~* ^(TRACE|TRACK|CONNECT)$) {
        return 405;
    }

    # ── Fix #8: HTTPS redirect (enable when certificate provisioned) ──────────
    # return 301 https://$host$request_uri;

    # Proxy to Node.js API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # ── Fix #3: Strip and re-set Host to prevent injection ────────────────
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching on API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve React SPA
    location / {
        root /var/www/ayush-portal/dist;
        try_files $uri $uri/ /index.html;
    }
}

# ── Fix #8: HTTPS server block (enable when cert is provisioned) ─────────────
